<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventura Marketing Internship Application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --panel: rgba(24, 24, 27, 0.42);
      --border: rgba(255,255,255,0.10);
      --text: #f8fafc;
      --muted: #a1a1aa;
      --accent: #a5ffd6;
      --accent-2: #7cf0c0;
      --accent-3: #d8fff0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', system-ui, sans-serif;
      min-height: 100%;
    }
    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(165,255,214,0.16), transparent 28%),
        radial-gradient(circle at 88% 20%, rgba(124,240,192,0.14), transparent 24%),
        linear-gradient(180deg, #020617 0%, #000000 42%, #000000 100%);
    }
    .aura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .aura::before,
    .aura::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(110px);
      opacity: 0.28;
      background: radial-gradient(circle, rgba(165,255,214,0.88) 0%, rgba(124,240,192,0.30) 40%, transparent 72%);
    }
    .aura::before {
      width: 30rem;
      height: 30rem;
      left: -8rem;
      top: -5rem;
    }
    .aura::after {
      width: 28rem;
      height: 28rem;
      right: -8rem;
      top: -2rem;
    }
    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 32px 16px 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shell {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }
    .brand {
      text-align: center;
    }
    .brand-mark {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-size: clamp(44px, 7vw, 76px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      padding-bottom: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #ffffff 56%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(165,255,214,0.10);
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      text-align: center;
    }
    .subtext {
      max-width: 720px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.55;
      text-align: center;
    }
    .panel {
      width: 100%;
      min-height: 680px;
      height: 680px;
      border-radius: 32px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(24,24,27,0.56), rgba(9,9,11,0.74));
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 18px;
    }
    @media (max-width: 768px) {
      .wrap { padding: 20px 12px 32px; }
      .panel { border-radius: 24px; padding: 12px; min-height: 780px; height: 780px; }
    }
  </style>
</head>
<body>
  <div class="aura"></div>
  <main class="wrap">
    <div class="shell">
      <div class="brand">
        <div class="eyebrow">Internship Opportunity</div>
        <div class="brand-mark">Ventura Marketing</div>
        <p class="subtext">Apply below for the Ventura Marketing internship. Keep it simple, answer thoughtfully, and we’ll review submissions for the next round.</p>
      </div>

      <section class="panel">
        <iframe
          src="https://api.venturamc.com/widget/form/RV8kpFCcihqOj8WyfIBT"
          style="width:100%;height:100%;border:none;border-radius:3px"
          id="inline-RV8kpFCcihqOj8WyfIBT"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Internship Hiring Form"
          data-height="609"
          data-layout-iframe-id="inline-RV8kpFCcihqOj8WyfIBT"
          data-form-id="RV8kpFCcihqOj8WyfIBT"
          title="Internship Hiring Form"
        ></iframe>
      </section>
    </div>
  </main>
  <script src="https://api.venturamc.com/js/form_embed.js"></script>
</body>
</html>
